<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — אינשטיין ווב</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Assistant:wght@400;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Assistant', sans-serif;
      background:
        radial-gradient(ellipse 700px 500px at 50% -10%, rgba(255, 184, 51, 0.08), transparent 60%),
        #0a0e1a;
      color: #eef2fa;
      padding: 2rem;
      text-align: center;
    }

    .page { max-width: 480px; }

    .code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(4rem, 14vw, 7rem);
      line-height: 1;
      color: rgba(238, 242, 250, 0.12);
      margin-bottom: 1.2rem;
      direction: ltr;
    }

    h1 {
      font-family: 'Suez One', serif;
      font-weight: 400;
      font-size: 1.6rem;
      margin-bottom: 0.6rem;
    }

    p {
      color: #a3aec6;
      line-height: 1.7;
      margin-bottom: 0.4rem;
    }

    p.en {
      font-size: 0.9rem;
      margin-bottom: 2.2rem;
      direction: ltr;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #0a0e1a;
      background: #ffb833;
      text-decoration: none;
      padding: 0.75rem 1.8rem;
      border-radius: 10px;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover {
      background: #ffc759;
      box-shadow: 0 6px 24px rgba(255, 184, 51, 0.25);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="code">404</div>
    <h1>הדף הזה לא קיים</h1>
    <p>אפילו אינשטיין לא היה מוצא אותו. ייתכן שהדף הוסר או שהכתובת השתנתה.</p>
    <p class="en">Page not found — it may have been moved or removed.</p>
    <a href="/">חזרה לדף הבית · Back home</a>
  </div>
</body>
</html>
