<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — איינשטיין אתרים</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Heebo', sans-serif;
      background:
        radial-gradient(ellipse 800px 500px at 80% -10%, rgba(1, 160, 198, 0.1), transparent 60%),
        radial-gradient(ellipse 700px 500px at 10% 110%, rgba(23, 99, 170, 0.08), transparent 60%),
        #ffffff;
      color: #0e2a47;
      padding: 2rem;
      text-align: center;
    }

    .page { max-width: 480px; }

    .code {
      font-family: 'Secular One', sans-serif;
      font-size: clamp(4.5rem, 14vw, 7.5rem);
      line-height: 1;
      background: linear-gradient(110deg, #1763aa, #01a0c6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
      direction: ltr;
    }

    h1 {
      font-family: 'Secular One', sans-serif;
      font-weight: 400;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    p { color: #4f6783; line-height: 1.7; margin-bottom: 0.4rem; }

    p.en { font-size: 0.9rem; margin-bottom: 2.2rem; direction: ltr; }

    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      background: linear-gradient(110deg, #1763aa, #01a0c6);
      text-decoration: none;
      padding: 0.8rem 1.9rem;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(23, 99, 170, 0.25);
      transition: box-shadow 0.25s ease, filter 0.25s ease;
    }

    a:hover {
      filter: brightness(1.08);
      box-shadow: 0 10px 28px rgba(1, 160, 198, 0.35);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="code">404</div>
    <h1>הדף הזה לא קיים</h1>
    <p>ייתכן שהדף הוסר או שהכתובת השתנתה.</p>
    <p class="en">Page not found — it may have been moved or removed.</p>
    <a href="/">חזרה לדף הבית · Back home</a>
  </div>
</body>
</html>
